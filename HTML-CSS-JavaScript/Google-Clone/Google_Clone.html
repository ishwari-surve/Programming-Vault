<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
</head>
<body>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body{
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background-color: white;
    }

    /* NAVBAR */
    .navbar{
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 10px 20px;
        gap: 15px;
    }
    .navbar a{
        text-decoration: none;
        color: #202124;
        font-size: 13px;
    }
    .navbar a:hover{
        text-decoration: underline;
    }
    .gmail-link{
        color: #202124;
        font-size: 13px;
        text-decoration: none;
    }
    .signin-btn{
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 9px 23px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
    }
    .signin-btn:hover{
        background-color: #1557b0;
    }
    .grid-icon{
        font-size: 20px;
        cursor: pointer;
        color: #5f6368;
    }

    /* MAIN CONTENT */
    .main{
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: -80px;
    }

    /* GOOGLE LOGO */
    .logo{
        font-size: 80px;
        font-weight: bold;
        margin-bottom: 25px;
        letter-spacing: -2px;
    }
    .logo span:nth-child(1){ color: #4285F4; }
    .logo span:nth-child(2){ color: #EA4335; }
    .logo span:nth-child(3){ color: #FBBC05; }
    .logo span:nth-child(4){ color: #4285F4; }
    .logo span:nth-child(5){ color: #34A853; }
    .logo span:nth-child(6){ color: #EA4335; }

    /* SEARCH BAR */
    .search-container{
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
    }
    .search-box{
        display: flex;
        align-items: center;
        border: 1px solid #dfe1e5;
        border-radius: 24px;
        padding: 10px 15px;
        width: 550px;
        gap: 10px;
        box-shadow: none;
        transition: box-shadow 0.3s;
    }
    .search-box:hover{
        box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        border-color: rgba(223,225,229,0);
    }
    .search-box:focus-within{
        box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        border-color: rgba(223,225,229,0);
    }
    .search-icon{
        color: #9aa0a6;
        font-size: 18px;
    }
    .search-input{
        flex: 1;
        border: none;
        outline: none;
        font-size: 16px;
        color: #202124;
        background: transparent;
    }
    .mic-icon{
        color: #4285F4;
        font-size: 18px;
        cursor: pointer;
    }
    .camera-icon{
        color: #4285F4;
        font-size: 18px;
        cursor: pointer;
    }

    /* SEARCH BUTTONS */
    .search-buttons{
        display: flex;
        gap: 10px;
    }
    .search-btn{
        background-color: #f8f9fa;
        border: 1px solid #f8f9fa;
        border-radius: 4px;
        padding: 10px 20px;
        font-size: 14px;
        color: #3c4043;
        cursor: pointer;
    }
    .search-btn:hover{
        border-color: #dadce0;
        box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        color: #202124;
    }

    /* LANGUAGE */
    .language{
        margin-top: 25px;
        font-size: 13px;
        color: #202124;
    }
    .language a{
        color: #1a73e8;
        text-decoration: none;
        margin-left: 5px;
    }
    .language a:hover{
        text-decoration: underline;
    }

    /* FOOTER */
    .footer{
        background-color: #f2f2f2;
        border-top: 1px solid #dadce0;
    }
    .footer-top{
        padding: 15px 25px;
        font-size: 14px;
        color: #70757a;
        border-bottom: 1px solid #dadce0;
    }
    .footer-bottom{
        display: flex;
        justify-content: space-between;
        padding: 12px 25px;
    }
    .footer-links{
        display: flex;
        gap: 20px;
    }
    .footer-links a{
        text-decoration: none;
        color: #70757a;
        font-size: 13px;
    }
    .footer-links a:hover{
        text-decoration: underline;
    }
</style>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#" class="gmail-link">Gmail</a>
    <a href="#">Images</a>
    <span class="grid-icon">⊞</span>
    <button class="signin-btn">Sign in</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- LOGO -->
    <div class="logo">
        <span>G</span>
        <span>o</span>
        <span>o</span>
        <span>g</span>
        <span>l</span>
        <span>e</span>
    </div>

    <!-- SEARCH -->
    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="">
            <span class="mic-icon">🎤</span>
            <span class="camera-icon">📷</span>
        </div>
        <div class="search-buttons">
            <button class="search-btn">Google Search</button>
            <button class="search-btn">I'm Feeling Lucky</button>
        </div>
    </div>

    <!-- LANGUAGE -->
    <div class="language">
        Google offered in:
        <a href="#">हिन्दी</a>
        <a href="#">বাংলা</a>
        <a href="#">తెలుగు</a>
        <a href="#">मराठी</a>
        <a href="#">தமிழ்</a>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-top">India</div>
    <div class="footer-bottom">
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
            <a href="#">How Search works</a>
        </div>
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>
    </div>
</div>

</body>
</html>
