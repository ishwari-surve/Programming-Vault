<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Clone</title>
</head>
<body class="body">
<style>
    .main{
        display: flex;
        margin-top: 40px;
    }
    .body{
        background-color: rgb(211,211,211);
    }
    .left{
        padding-left: 20%;
        display: grid;
        place-content: center;
        color: #064597; 
    }
    .right{
        background-color: white;
        width: 500px;
        height: 500px;
        margin-top: 5%;
        margin-left: 5%;
        border-radius: 2%;
    }
    .facebook{
        color: #0549a0;
        font-size: 80px;
    }
    .text{
        margin-top: -20px;
        font-size: 30px;
    }
    .innerdiv{
        background-color: white;
        width: 450px;
        height: 500px;
        margin-top: 50px;
        margin-left: 25px; 
        border-radius: 2%;
        padding: 20px;
    }
    .username, .password {
        font-size: 18px;
        width: 90%; 
        padding: 5px;
    }
    .password {
        margin-top: 15px;
    }
    .login{
        margin-top: 20px;
        width: 92%;
        height: 37px;
        font-size: larger;
        background-color: #1877f2; 
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .login:hover {
        background-color: #165fc1;
    }
    .fp{
        margin-left: 124px;
        margin-top: 20px;
    }
    .newacc{
        margin-top: 20px;
        width: 216px;
        height: 37px;
        margin-left: 72px;
        background-color: #42b72a; 
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .newacc:hover {
        background-color: #36a420;
    }
    .create{
        color: black;
        margin-left: 23px;
    }
</style>

<div class="main">
    <div class="left">
        <h1 class="facebook">Facebook</h1>
        <p class="text">Facebook helps you connect and share <br> with the people in your life</p>
    </div>
    <div class="right">
        <div class="innerdiv">
            <input type="text" class="username" placeholder="Enter the username">
            <br>
            <input type="password" class="password" placeholder="Enter the Password">
            <br>
            <button class="login">Login</button>
            <br>
            <a href="" class="fp">Forgot Password</a>
            <hr>
            <button class="newacc">Create New Account</button>
        </div>
    </div>
</div>
</body>
</html>
