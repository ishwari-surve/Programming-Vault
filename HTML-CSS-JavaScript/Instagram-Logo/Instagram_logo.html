<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
    .outer{
        height: 100px;
        width: 100px;
        background: linear-gradient(45deg, #FFDC80, #FC4A1A, #D62976, #962FBF, #4A00E0);
        border-radius: 20%;
        display: grid;
        place-items: center;
    }
    .inner{
        height: 70px;
        width: 70px;
        background-color: #F5F5F5;
        border-radius: 20%;
        display: grid;
        place-items: center;
    }
    .third{
        height: 60px;
        width: 55px;
        background: linear-gradient(45deg, #FFDC80, #FC4A1A, #D62976, #962FBF, #4A00E0);
        border-radius: 20%;
        display: grid;
        place-items: center;
    }
    .outercircle{
        height: 40px;
        width: 40px;
        background-color: white;
        border-radius: 50%;
        display: grid;
        place-items: center;
        margin-top: -20px;
    }
    .innercircle{
        height: 25px;
        width: 25px;
        background: linear-gradient(45deg, #FFDC80, #FC4A1A, #D62976, #962FBF, #4A00E0);
        display: grid;
        border-radius: 50%;
    }
    .dot{
        height: 10px;
        width: 10px;
        background-color: white;
        border-radius: 50%;
        position: relative;
        top: -2px;
        left: 18px;
    }
</style>

<div class="outer">
    <div class="inner">
        <div class="third">
            <div class="dot"></div>
            <div class="outercircle">
                <div class="innercircle">
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
